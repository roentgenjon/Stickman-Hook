<!DOCTYPE html>
<html>
  <head>
    
    <meta charset="utf-8" />
    <title>Masked's Game Hub 2.0 - Stickman Hook</title>
    <link rel="shortcut icon" href="../../images/ico.ico">
    <script src="../../storage/js/cloak.js"></script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
    />

    <style>
      html,
      body {
        position: absolute;
        top: 0px;
        left: 0px;
        margin: 0;
        padding: 0;
        border: 0;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        background-color: black;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .levels-button {
        color: white;
        padding: 10px 20px;
        font-size: 14px;
        background-color: rgba(0, 6, 95, 0.65);
        border: 2px solid rgba(255, 255, 255, 0.45);
        border-radius: 8px;
      }

      .level-select-grid {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 16px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-content: flex-start;
        gap: 10px;
        pointer-events: all;
        background-color: rgba(0, 6, 95, 0.88);
        z-index: 100;
      }

      .level-select-btn {
        width: 64px;
        height: 64px;
        font-size: 18px;
        color: white;
        background-color: rgba(0, 185, 220, 0.85);
        border: 2px solid rgba(255, 255, 255, 0.45);
        border-radius: 8px;
        font-family: JUNEGULL, sans-serif;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .level-select-btn:active {
        background-color: rgba(0, 113, 163, 0.9);
      }

      .replay-button {
        position: absolute;
        bottom: 65px;
        right: 4%;
        color: white;
        font-family: JUNEGULL, sans-serif;
        font-size: 10px;
        width: 100px;
        height: 50px;
        background-color: rgba(0, 113, 163, 0.85);
        border: 2px solid rgba(255, 255, 255, 0.45);
        border-radius: 8px;
        cursor: pointer;
      }
    </style>

    <!-- Poki SDK -->
    <script src="poki3.js"></script>
  </head>
  <body>

    <script src="bundle.js"></script>
  </body>
</html>
