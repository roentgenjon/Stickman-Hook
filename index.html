<!DOCTYPE html>
<html>
  <head>
    
    <meta charset="utf-8" />
    <title>Masked's Game Hub 2.0 - Stickman Hook</title>
    <link rel="shortcut icon" href="../../images/ico.ico">
    <script src="../../storage/js/cloak.js"></script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover"
    />

    <style>
      html,
      body {
        position: absolute;
        top: 0px;
        left: 0px;
        margin: 0;
        padding: 0;
        border: 0;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        background-color: black;
      }
      canvas {
        display: block;
        width: 100%;
        height: auto;
      }

      .levels-button {
        color: white;
        padding: 10px 20px;
        font-size: 14px;
        background-color: rgba(0, 6, 95, 0.65);
        border: 2px solid rgba(255, 255, 255, 0.45);
        border-radius: 8px;
      }

      .level-select-grid {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 16px;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-content: flex-start;
        gap: 10px;
        pointer-events: all;
        background-color: rgba(0, 6, 95, 0.88);
        z-index: 100;
      }

      .level-select-btn {
        width: 64px;
        height: 64px;
        font-size: 18px;
        color: white;
        background-color: rgba(0, 185, 220, 0.85);
        border: 2px solid rgba(255, 255, 255, 0.45);
        border-radius: 8px;
        font-family: JUNEGULL, sans-serif;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .level-select-btn:active {
        background-color: rgba(0, 113, 163, 0.9);
      }

      .replay-button {
        position: absolute;
        bottom: 65px;
        right: 4%;
        color: white;
        font-family: JUNEGULL, sans-serif;
        font-size: 10px;
        width: 100px;
        height: 50px;
        background-color: rgba(0, 113, 163, 0.85);
        border: 2px solid rgba(255, 255, 255, 0.45);
        border-radius: 8px;
        cursor: pointer;
      }

      /* ── Quest & Leaderboard System ── */
      .qs-modal {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 200;
        background: rgba(0, 4, 60, 0.96);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 0 0 16px 0;
        font-family: JUNEGULL, sans-serif;
        color: white;
      }
      .qs-topbar {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: center;
        padding: 10px 16px;
        background: rgba(0,0,0,0.4);
        font-size: 14px;
        flex-shrink: 0;
        position: relative;
      }
      .qs-close {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 6px;
        color: white;
        font-size: 16px;
        width: 34px;
        height: 34px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: sans-serif;
      }
      .qs-close:active { background: rgba(255,255,255,0.3); }
      .qs-qcount { opacity: 0.6; font-size: 12px; }
      .qs-cats {
        display: flex;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        gap: 6px;
        padding: 10px 12px;
        flex-shrink: 0;
        scrollbar-width: none;
      }
      .qs-cats::-webkit-scrollbar { display: none; }
      .qs-cat-btn {
        flex-shrink: 0;
        background: rgba(255,255,255,0.08);
        border: none;
        border-radius: 8px 8px 0 0;
        color: white;
        font-family: JUNEGULL, sans-serif;
        font-size: 11px;
        padding: 8px 10px 6px;
        cursor: pointer;
        text-align: center;
        line-height: 1.3;
      }
      .qs-cat-btn.qs-active {
        background: rgba(255,255,255,0.2);
      }
      .qs-list {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 8px 12px;
      }
      .qs-item {
        background: rgba(255,255,255,0.07);
        border-radius: 8px;
        padding: 10px 12px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .qs-item.qs-done {
        background: rgba(39, 174, 96, 0.2);
        border: 1px solid rgba(39,174,96,0.5);
      }
      .qs-item-main { flex: 1; min-width: 0; }
      .qs-item-title {
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .qs-item-rew {
        font-size: 11px;
        opacity: 0.75;
        margin-top: 2px;
        display: flex;
        gap: 6px;
      }
      .qs-cr { color: #f1c40f; }
      .qs-tr { color: #9b59b6; }
      .qs-check {
        color: #2ecc71;
        font-size: 18px;
        flex-shrink: 0;
      }
      .qs-prog {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 3px;
        flex-shrink: 0;
        min-width: 70px;
      }
      .qs-bar {
        width: 70px;
        height: 6px;
        background: rgba(255,255,255,0.15);
        border-radius: 3px;
        overflow: hidden;
      }
      .qs-fill {
        height: 100%;
        background: linear-gradient(90deg,#3498db,#9b59b6);
        border-radius: 3px;
        transition: width 0.3s;
      }
      .qs-prog-txt { font-size: 10px; opacity: 0.65; }

      /* ── Leaderboard ── */
      .qs-register {
        padding: 12px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
      }
      .qs-register p { margin: 0; font-size: 13px; text-align: center; }
      .qs-name-input {
        width: 100%;
        max-width: 280px;
        padding: 10px 12px;
        border-radius: 8px;
        border: 2px solid rgba(255,255,255,0.3);
        background: rgba(255,255,255,0.1);
        color: white;
        font-family: JUNEGULL, sans-serif;
        font-size: 14px;
        box-sizing: border-box;
      }
      .qs-name-input::placeholder { opacity: 0.5; }
      .qs-reg-btn {
        padding: 10px 24px;
        background: #3498db;
        border: none;
        border-radius: 8px;
        color: white;
        font-family: JUNEGULL, sans-serif;
        font-size: 14px;
        cursor: pointer;
      }
      .qs-me {
        padding: 10px 16px;
        text-align: center;
      }
      .qs-me-name { font-size: 15px; }
      .qs-me-pos { font-size: 12px; opacity: 0.7; margin-top: 2px; }
      .qs-msg {
        color: #2ecc71;
        font-size: 12px;
        margin: 0;
        text-align: center;
        padding: 4px 0;
      }
      .qs-actions {
        display: flex;
        gap: 8px;
        justify-content: center;
        padding: 8px 12px;
        flex-shrink: 0;
      }
      .qs-act-btn {
        padding: 8px 14px;
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.25);
        border-radius: 8px;
        color: white;
        font-family: JUNEGULL, sans-serif;
        font-size: 12px;
        cursor: pointer;
      }
      .qs-act-btn:active { background: rgba(255,255,255,0.25); }
      .qs-panel {
        padding: 10px 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
        background: rgba(255,255,255,0.05);
        margin: 0 12px;
        border-radius: 8px;
        flex-shrink: 0;
      }
      .qs-input {
        width: 100%;
        max-width: 260px;
        padding: 9px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.25);
        background: rgba(255,255,255,0.08);
        color: white;
        font-family: JUNEGULL, sans-serif;
        font-size: 13px;
        box-sizing: border-box;
      }
      .qs-input::placeholder { opacity: 0.5; }
      .qs-num { width: 120px; max-width: 120px; }
      .qs-send-btn {
        padding: 9px 20px;
        background: #27ae60;
        border: none;
        border-radius: 8px;
        color: white;
        font-family: JUNEGULL, sans-serif;
        font-size: 13px;
        cursor: pointer;
      }
      .qs-rank-opt {
        width: 100%;
        max-width: 280px;
        padding: 10px 14px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 8px;
        color: white;
        font-family: JUNEGULL, sans-serif;
        font-size: 12px;
        cursor: pointer;
        text-align: left;
      }
      .qs-rank-opt.qs-buyable { border-color: #f1c40f; }
      .qs-rank-opt.qs-owned { border-color: #2ecc71; color: #2ecc71; cursor: default; }
      .qs-rank-opt:disabled:not(.qs-owned) { opacity: 0.4; cursor: not-allowed; }
      .qs-lb {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 8px 12px;
      }
      .qs-lb-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 6px;
        margin-bottom: 4px;
        background: rgba(255,255,255,0.05);
        font-size: 13px;
      }
      .qs-lb-row.qs-lb-me {
        background: rgba(52, 152, 219, 0.3);
        border: 1px solid rgba(52,152,219,0.6);
      }
      .qs-lb-pos {
        min-width: 34px;
        font-size: 12px;
        opacity: 0.7;
        flex-shrink: 0;
      }
      .qs-lb-info { flex: 1; min-width: 0; }
      .qs-lb-rnk { font-size: 11px; opacity: 0.8; }
      .qs-lb-sc { flex-shrink: 0; font-size: 12px; color: #9b59b6; }
      .qs-loading, .qs-empty {
        text-align: center;
        padding: 20px;
        opacity: 0.6;
        font-size: 13px;
      }
    </style>

    <!-- Poki SDK -->
    <script src="poki3.js"></script>
  </head>
  <body>

    <script src="bundle.js"></script>
  </body>
</html>
